<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000010" />
  <title>SpinWars – Blade Champions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000010;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ─────────────────────────────────────────────────────────────
//  SpinWars – Blade Champions  |  Pure HTML5 Canvas Game
// ─────────────────────────────────────────────────────────────

// ── Canvas setup ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── roundRect polyfill ────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rad = typeof r === 'number' ? r : (r[0] || 0);
    this.beginPath();
    this.moveTo(x + rad, y);
    this.lineTo(x + w - rad, y);
    this.quadraticCurveTo(x + w, y,     x + w, y + rad);
    this.lineTo(x + w, y + h - rad);
    this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    this.lineTo(x + rad, y + h);
    this.quadraticCurveTo(x, y + h,     x, y + h - rad);
    this.lineTo(x, y + rad);
    this.quadraticCurveTo(x, y,         x + rad, y);
    this.closePath();
  };
}

// ── Constants ─────────────────────────────────────────────────
const STATES = { MENU: 0, PLAYING: 1, WAVE_CLEAR: 2, GAME_OVER: 3 };
const DASH_DURATION  = 14;
const DASH_COOLDOWN  = 65;
const DASH_SPEED     = 15;
const JOYSTICK_R     = 55; // outer ring radius
const JOYSTICK_KNOB  = 22; // inner knob radius
const DASH_BTN_R     = 38;
const POWERUP_LIFE          = 600; // frames
const POWERUP_SPAWN_INTERVAL = 650; // frames between automatic power-up spawns
const FIRST_POWERUP_FRAME    = 240; // frame at which the first power-up spawns

// ── Game state ────────────────────────────────────────────────
let state    = STATES.MENU;
let score    = 0;
let highScore = parseInt(localStorage.getItem('sw_hi') || '0');
let wave     = 1;
let waveTimer = 0;
let frame    = 0;

// ── Screen shake ─────────────────────────────────────────────
const shake = { x: 0, y: 0, mag: 0 };
function addShake(m) { shake.mag = Math.max(shake.mag, m); }
function updateShake() {
  if (shake.mag > 0.1) {
    shake.x = (Math.random() - 0.5) * shake.mag;
    shake.y = (Math.random() - 0.5) * shake.mag;
    shake.mag *= 0.82;
  } else { shake.x = shake.y = shake.mag = 0; }
}

// ── Player ────────────────────────────────────────────────────
const player = {
  x: 0, y: 0, vx: 0, vy: 0,
  radius: 22,
  spinAngle: 0,
  energy: 100, maxEnergy: 100,
  color: '#00e5ff', bladeColor: '#0088cc', blades: 3,
  invincible: 0, dashCooldown: 0, dead: false
};
let dashActive = false, dashTimer = 0;
const effects  = { speed: 0, attack: 0, shield: 0 };

// ── Particles ─────────────────────────────────────────────────
let particles = [];

function burst(x, y, color, n, spd, sizeMax) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (0.4 + Math.random() * 0.6) * spd;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 1,
      decay: 0.018 + Math.random() * 0.025,
      size: 1.5 + Math.random() * (sizeMax - 1.5),
      color
    });
  }
}

function tickParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx; p.y  += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Enemies ───────────────────────────────────────────────────
const ETYPES = {
  rusher:  { radius:18, maxHP:55,  speed:3.4, color:'#ff3333', bc:'#cc0000', blades:2, pts:100, sr:0.12 },
  circler: { radius:15, maxHP:40,  speed:3.0, color:'#ff8800', bc:'#cc6600', blades:4, pts:150, sr:0.20 },
  tank:    { radius:28, maxHP:160, speed:1.9, color:'#cc00ff', bc:'#8800cc', blades:3, pts:300, sr:0.06 },
  bomber:  { radius:20, maxHP:75,  speed:2.4, color:'#ffdd00', bc:'#ffaa00', blades:6, pts:200, sr:0.24 }
};

let enemies = [];

function spawnEnemy(type, x, y) {
  const t = ETYPES[type];
  enemies.push({
    type, x, y, vx: 0, vy: 0,
    radius: t.radius, hp: t.maxHP, maxHP: t.maxHP,
    speed: t.speed, color: t.color, bc: t.bc, blades: t.blades,
    pts: t.pts, sr: t.sr,
    angle: Math.random() * Math.PI * 2,
    timer: 0, chargeTimer: 0
  });
}

function spawnWave(w) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const ar = arenaR();
  const n  = Math.min(2 + w, 12);
  for (let i = 0; i < n; i++) {
    const a  = (i / n) * Math.PI * 2;
    const d  = ar * 0.68;
    const x  = cx + Math.cos(a) * d;
    const y  = cy + Math.sin(a) * d;
    let type;
    if      (w <= 2)             type = 'rusher';
    else if (w <= 4)             type = Math.random() < 0.5 ? 'rusher' : 'circler';
    else {
      const r = Math.random();
      if      (r < 0.38) type = 'rusher';
      else if (r < 0.62) type = 'circler';
      else if (r < 0.80) type = 'bomber';
      else               type = 'tank';
    }
    spawnEnemy(type, x, y);
  }
  if (w % 5 === 0) {
    spawnEnemy('tank', cx + ar * 0.3, cy);
    spawnEnemy('tank', cx - ar * 0.3, cy);
  }
}

// ── Power-ups ─────────────────────────────────────────────────
const PU_DEFS = [
  { kind:'energy', color:'#00ffaa', label:'E', desc:'Energy Restore' },
  { kind:'speed',  color:'#ffff00', label:'S', desc:'Speed Boost'    },
  { kind:'attack', color:'#ff8800', label:'P', desc:'Power Blade'    },
  { kind:'shield', color:'#8888ff', label:'D', desc:'Defence Shield' }
];
let powerups = [];

function spawnPU(x, y) {
  const d = PU_DEFS[Math.floor(Math.random() * PU_DEFS.length)];
  powerups.push({ ...d, x, y, radius: 13, pulse: 0, life: POWERUP_LIFE });
}

function randomPU() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const ar = arenaR();
  const a  = Math.random() * Math.PI * 2;
  const d  = Math.random() * ar * 0.65;
  spawnPU(cx + Math.cos(a) * d, cy + Math.sin(a) * d);
}

function applyPU(pu) {
  switch (pu.kind) {
    case 'energy': player.energy = Math.min(player.maxEnergy, player.energy + 55); break;
    case 'speed':  effects.speed  = 300; break;
    case 'attack': effects.attack = 300; break;
    case 'shield': effects.shield = 300; player.invincible = 300; break;
  }
  burst(pu.x, pu.y, pu.color, 22, 5, 6);
}

// ── Controls ──────────────────────────────────────────────────
const keys = {};

const joy = {
  active: false, id: -1,
  ox: 0, oy: 0,       // origin (where finger first touched)
  dx: 0, dy: 0        // normalised direction [-1, 1]
};
const dashBtn = { active: false, id: -1 };

function dashBtnPos() {
  return { x: canvas.width - 72, y: canvas.height - 72 };
}

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))
    e.preventDefault();
  if (e.code === 'Space') {
    if (state === STATES.PLAYING) tryDash();
    else startGame();
  }
  if (e.code === 'Enter' || e.code === 'KeyP') startGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('touchstart',  onTS, { passive: false });
canvas.addEventListener('touchmove',   onTM, { passive: false });
canvas.addEventListener('touchend',    onTE, { passive: false });
canvas.addEventListener('touchcancel', onTE, { passive: false });
canvas.addEventListener('click', onClick);

function onClick(e) {
  if (state !== STATES.PLAYING && state !== STATES.WAVE_CLEAR) { startGame(); return; }
}

function onTS(e) {
  e.preventDefault();
  if (state !== STATES.PLAYING && state !== STATES.WAVE_CLEAR) { startGame(); return; }
  for (const t of e.changedTouches) {
    const tx = t.clientX, ty = t.clientY;
    const db = dashBtnPos();
    if (Math.hypot(tx - db.x, ty - db.y) <= DASH_BTN_R + 15 && dashBtn.id === -1) {
      dashBtn.active = true; dashBtn.id = t.identifier; tryDash();
    } else if (!joy.active) {
      joy.active = true; joy.id = t.identifier;
      joy.ox = tx; joy.oy = ty; joy.dx = 0; joy.dy = 0;
    }
  }
}

function onTM(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      let dx = t.clientX - joy.ox, dy = t.clientY - joy.oy;
      const len = Math.hypot(dx, dy);
      if (len > JOYSTICK_R) { dx = dx / len * JOYSTICK_R; dy = dy / len * JOYSTICK_R; }
      joy.dx = dx / JOYSTICK_R;
      joy.dy = dy / JOYSTICK_R;
    }
  }
}

function onTE(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id)     { joy.active = false; joy.id = -1; joy.dx = 0; joy.dy = 0; }
    if (t.identifier === dashBtn.id) { dashBtn.active = false; dashBtn.id = -1; }
  }
}

// ── Dash ──────────────────────────────────────────────────────
function tryDash() {
  if (player.dead || player.dashCooldown > 0 || dashActive) return;
  dashActive = true; dashTimer = DASH_DURATION;
  player.dashCooldown = DASH_COOLDOWN;
  const spd = Math.hypot(player.vx, player.vy);
  if (spd > 0.2) {
    player.vx = player.vx / spd * DASH_SPEED;
    player.vy = player.vy / spd * DASH_SPEED;
  } else {
    const a = player.spinAngle;
    player.vx = Math.cos(a) * DASH_SPEED;
    player.vy = Math.sin(a) * DASH_SPEED;
  }
  burst(player.x, player.y, '#00e5ff', 18, 6, 5);
  addShake(5);
}

// ── Arena helper ──────────────────────────────────────────────
function arenaR() { return Math.min(canvas.width, canvas.height) * 0.42; }

function keepInArena(obj) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const ar = arenaR();
  const dx = obj.x - cx, dy = obj.y - cy;
  const d  = Math.hypot(dx, dy);
  const maxD = ar - obj.radius;
  if (d > maxD) {
    const nx = dx / d, ny = dy / d;
    obj.x = cx + nx * maxD;
    obj.y = cy + ny * maxD;
    const dot = obj.vx * nx + obj.vy * ny;
    obj.vx -= 1.6 * dot * nx;
    obj.vy -= 1.6 * dot * ny;
    return Math.abs(dot);
  }
  return 0;
}

// ── Collision ─────────────────────────────────────────────────
function checkCollide(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const d  = Math.hypot(dx, dy);
  const md = a.radius + b.radius;
  return d < md ? { d, dx, dy, md } : null;
}

function resolveCollide(a, b, c) {
  const { d, dx, dy, md } = c;
  const nx = dx / d, ny = dy / d;
  const ov = (md - d) * 0.5;
  a.x -= nx * ov; a.y -= ny * ov;
  b.x += nx * ov; b.y += ny * ov;
  const rvx = a.vx - b.vx, rvy = a.vy - b.vy;
  const imp = rvx * nx + rvy * ny;
  if (imp > 0) return 0;
  const j = -(1 + 0.72) * imp / 2;
  a.vx += j * nx; a.vy += j * ny;
  b.vx -= j * nx; b.vy -= j * ny;
  return Math.abs(imp);
}

// ── Enemy AI ──────────────────────────────────────────────────
function tickEnemy(e) {
  e.timer++;
  const dx = player.x - e.x, dy = player.y - e.y;
  const d  = Math.hypot(dx, dy) || 1;

  switch (e.type) {
    case 'rusher': {
      e.vx += (dx / d) * 0.35;
      e.vy += (dy / d) * 0.35;
      const s = Math.hypot(e.vx, e.vy);
      if (s > e.speed) { e.vx = e.vx / s * e.speed; e.vy = e.vy / s * e.speed; }
      break;
    }
    case 'circler': {
      const ca  = Math.atan2(dy, dx);
      const px  = -Math.sin(ca), py = Math.cos(ca);
      const td  = 110;
      const ax  = d > td + 15 ? dx / d : d < td - 15 ? -dx / d : 0;
      const ay  = d > td + 15 ? dy / d : d < td - 15 ? -dy / d : 0;
      e.vx += px * 0.42 + ax * 0.18;
      e.vy += py * 0.42 + ay * 0.18;
      const s = Math.hypot(e.vx, e.vy);
      if (s > e.speed) { e.vx = e.vx / s * e.speed; e.vy = e.vy / s * e.speed; }
      if (e.timer % 190 === 0 && d < 220) {
        e.vx = dx / d * 8.5; e.vy = dy / d * 8.5;
      }
      break;
    }
    case 'tank': {
      e.vx += (dx / d) * 0.14;
      e.vy += (dy / d) * 0.14;
      const s = Math.hypot(e.vx, e.vy);
      if (s > e.speed) { e.vx = e.vx / s * e.speed; e.vy = e.vy / s * e.speed; }
      break;
    }
    case 'bomber': {
      e.chargeTimer++;
      if (e.chargeTimer < 110) {
        e.vx *= 0.94; e.vy *= 0.94;
        e.sr = Math.min(e.sr + 0.008, 0.45);
      } else {
        e.vx = dx / d * 11; e.vy = dy / d * 11;
        e.chargeTimer = 0; e.sr = 0.24;
        burst(e.x, e.y, '#ffdd00', 12, 5, 4);
        addShake(3);
      }
      break;
    }
  }
  e.angle += e.sr;
}

// ── Start / Reset ─────────────────────────────────────────────
function startGame() {
  state = STATES.PLAYING;
  score = 0; wave = 1; frame = 0;
  const cx = canvas.width / 2, cy = canvas.height / 2;
  Object.assign(player, {
    x: cx, y: cy, vx: 0, vy: 0,
    energy: player.maxEnergy, spinAngle: 0,
    invincible: 0, dashCooldown: 0, dead: false
  });
  dashActive = false; dashTimer = 0;
  effects.speed = effects.attack = effects.shield = 0;
  enemies = []; particles = []; powerups = [];
  spawnWave(1);
}

// ── Update ────────────────────────────────────────────────────
function update() {
  frame++;
  const cx = canvas.width / 2, cy = canvas.height / 2;

  // Effect timers
  if (effects.speed  > 0) effects.speed--;
  if (effects.attack > 0) effects.attack--;
  if (effects.shield > 0) effects.shield--;

  // Input
  let ix = 0, iy = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) ix -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ix += 1;
  if (keys['ArrowUp']    || keys['KeyW']) iy -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) iy += 1;
  if (joy.active) { ix = joy.dx; iy = joy.dy; }

  const ilen = Math.hypot(ix, iy);
  if (ilen > 0) {
    const nx = ix / ilen, ny = iy / ilen;
    if (!dashActive) {
      const maxSpd = effects.speed > 0 ? 9.5 : 6.5;
      player.vx += nx * 0.85; player.vy += ny * 0.85;
      const spd = Math.hypot(player.vx, player.vy);
      if (spd > maxSpd) { player.vx = player.vx / spd * maxSpd; player.vy = player.vy / spd * maxSpd; }
    }
    player.spinAngle = Math.atan2(iy, ix);
  }

  // Friction
  const fric = dashActive ? 0.97 : 0.87;
  player.vx *= fric; player.vy *= fric;

  player.x += player.vx; player.y += player.vy;

  // Visual spin – always spinning, faster when moving
  player.spinAngle += 0.08 + Math.hypot(player.vx, player.vy) * 0.018;

  // Arena boundary
  const edgeDmg = keepInArena(player);
  if (edgeDmg > 3 && player.invincible <= 0) {
    player.energy -= edgeDmg * 2.2;
    burst(player.x, player.y, '#ff0000', 6, 3, 3);
    addShake(edgeDmg * 0.8);
  }

  // Dash timer
  if (dashActive) { dashTimer--; if (dashTimer <= 0) dashActive = false; }
  if (player.dashCooldown > 0) player.dashCooldown--;
  if (player.invincible   > 0) player.invincible--;

  // Time score
  if (frame % 60 === 0) score += 5;

  // Enemy update
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    tickEnemy(e);
    e.x += e.vx; e.y += e.vy;
    keepInArena(e);
    e.vx *= 0.91; e.vy *= 0.91;

    // Player ↔ enemy collision
    const col = checkCollide(player, e);
    if (col) {
      const imp = resolveCollide(player, e, col);
      if (imp > 0) {
        const dmgMult = effects.attack > 0 ? 2.2 : 1;
        // Player deals damage to enemy
        const eDmg = imp * (dashActive ? 3.5 : 0.6) * dmgMult;
        e.hp -= eDmg;
        burst(e.x, e.y, e.color, Math.ceil(eDmg / 2), 3.5, 4);
        if (dashActive) addShake(4);

        // Enemy deals damage to player
        if (player.invincible <= 0 && effects.shield <= 0) {
          const pDmg = imp * 0.9;
          player.energy -= pDmg;
          player.invincible = 22;
          if (imp > 2) { burst(player.x, player.y, '#ff2244', 8, 3, 4); addShake(imp * 0.6); }
        }
      }
    }

    // Enemy death
    if (e.hp <= 0) {
      score += e.pts;
      burst(e.x, e.y, e.color, 32, 7, 6);
      burst(e.x, e.y, '#ffffff', 12, 5, 3);
      addShake(7);
      enemies.splice(i, 1);
      if (Math.random() < 0.32) spawnPU(e.x, e.y);
    }
  }

  // Enemy ↔ enemy collisions
  for (let i = 0; i < enemies.length; i++)
    for (let j = i + 1; j < enemies.length; j++) {
      const col = checkCollide(enemies[i], enemies[j]);
      if (col) resolveCollide(enemies[i], enemies[j], col);
    }

  // Power-ups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.pulse = (pu.pulse + 0.06) % (Math.PI * 2);
    pu.life--;
    if (pu.life <= 0) { powerups.splice(i, 1); continue; }
    if (Math.hypot(player.x - pu.x, player.y - pu.y) < player.radius + pu.radius) {
      applyPU(pu); powerups.splice(i, 1);
    }
  }

  // Periodic power-up spawn (first one after FIRST_POWERUP_FRAME frames)
  if (frame === FIRST_POWERUP_FRAME || (frame > FIRST_POWERUP_FRAME && (frame - FIRST_POWERUP_FRAME) % POWERUP_SPAWN_INTERVAL === 0)) randomPU();

  // Wave clear?
  if (enemies.length === 0) {
    score += wave * 500;
    wave++;
    state = STATES.WAVE_CLEAR;
    waveTimer = 130;
  }

  // Player death?
  if (player.energy <= 0) {
    player.energy = 0;
    burst(player.x, player.y, '#00e5ff', 55, 9, 7);
    burst(player.x, player.y, '#ffffff', 20, 6, 4);
    addShake(14);
    if (score > highScore) { highScore = score; localStorage.setItem('sw_hi', highScore); }
    state = STATES.GAME_OVER;
  }

  tickParticles();
  updateShake();
}

function updateWaveClear() {
  waveTimer--;
  if (waveTimer <= 0) { state = STATES.PLAYING; spawnWave(wave); }
  tickParticles();
  updateShake();
}

// ── Drawing helpers ───────────────────────────────────────────
function glow(color, blur) { ctx.shadowBlur = blur; ctx.shadowColor = color; }
function noGlow()           { ctx.shadowBlur = 0;    ctx.shadowColor = 'transparent'; }

function drawSpinner(x, y, angle, radius, blades, color, bc, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.translate(x, y);
  ctx.rotate(angle);
  glow(color, 18);

  for (let i = 0; i < blades; i++) {
    ctx.save();
    ctx.rotate((i / blades) * Math.PI * 2);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo( radius * 0.28, -radius * 0.3,  radius * 0.8, -radius * 0.22, radius, 0);
    ctx.bezierCurveTo( radius * 0.8,   radius * 0.22, radius * 0.28, radius * 0.3,  0, 0);
    ctx.fillStyle = bc;
    ctx.fill();
    ctx.restore();
  }

  // Hub
  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.29, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 0.29);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(1, color);
  ctx.fillStyle = g;
  ctx.fill();

  noGlow();
  ctx.restore();
}

// ── Arena rendering ───────────────────────────────────────────
function drawArena() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const ar = arenaR();
  const t  = Date.now() * 0.001;

  // Void outside arena
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Arena background
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, ar, 0, Math.PI * 2);
  ctx.clip();

  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, ar);
  bg.addColorStop(0,   '#0a0a2e');
  bg.addColorStop(0.7, '#050520');
  bg.addColorStop(1,   '#020210');
  ctx.fillStyle = bg;
  ctx.fillRect(cx - ar, cy - ar, ar * 2, ar * 2);

  // Grid
  ctx.strokeStyle = 'rgba(0, 80, 200, 0.09)';
  ctx.lineWidth = 1;
  const g = 42;
  for (let x = cx - ar; x < cx + ar; x += g) {
    ctx.beginPath(); ctx.moveTo(x, cy - ar); ctx.lineTo(x, cy + ar); ctx.stroke();
  }
  for (let y = cy - ar; y < cy + ar; y += g) {
    ctx.beginPath(); ctx.moveTo(cx - ar, y); ctx.lineTo(cx + ar, y); ctx.stroke();
  }

  ctx.restore();

  // Animated border
  glow('#0055ff', 22);
  ctx.beginPath();
  ctx.arc(cx, cy, ar, 0, Math.PI * 2);
  ctx.strokeStyle = `hsl(${210 + Math.sin(t) * 25}, 100%, 62%)`;
  ctx.lineWidth = 4;
  ctx.stroke();
  noGlow();

  // Danger ring
  ctx.beginPath();
  ctx.arc(cx, cy, ar * 0.9, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255, 50, 50, 0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Centre marker
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0, 150, 255, 0.18)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ── Power-up rendering ────────────────────────────────────────
function drawPowerups() {
  for (const pu of powerups) {
    const pulse = Math.sin(pu.pulse) * 3;
    const fade  = pu.life < 120 ? pu.life / 120 : 1;
    ctx.globalAlpha = fade;

    // Outer ring
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, pu.radius + pulse, 0, Math.PI * 2);
    ctx.fillStyle = pu.color + '33';
    ctx.fill();
    glow(pu.color, 12);
    ctx.strokeStyle = pu.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    noGlow();

    // Letter
    ctx.fillStyle = pu.color;
    ctx.font = `bold ${Math.round(pu.radius)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pu.label, pu.x, pu.y);
    ctx.textBaseline = 'alphabetic';
    ctx.globalAlpha = 1;
  }
}

// ── HUD ───────────────────────────────────────────────────────
function drawHUD() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2;

  // Energy bar
  const bw = Math.min(300, W * 0.58);
  const bh = 18, bx = cx - bw / 2, by = 22;
  const ratio = player.energy / player.maxEnergy;
  const eColor = ratio > 0.5 ? '#00ff88' : ratio > 0.25 ? '#ffaa00' : '#ff3300';

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.roundRect(bx - 3, by - 3, bw + 6, bh + 6, 6);
  ctx.fill();

  ctx.fillStyle = '#111122';
  ctx.roundRect(bx, by, bw, bh, 4);
  ctx.fill();

  if (ratio > 0) {
    const eg = ctx.createLinearGradient(bx, 0, bx + bw * ratio, 0);
    eg.addColorStop(0, eColor);
    eg.addColorStop(1, '#ffffff88');
    ctx.fillStyle = eg;
    ctx.roundRect(bx, by, bw * ratio, bh, 4);
    ctx.fill();
  }

  ctx.fillStyle = '#aaaacc';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('SPIN ENERGY', cx, by - 5);

  // Score
  glow('#00e5ff', 10);
  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 26px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(score, 14, 32);
  noGlow();

  // Wave
  glow('#ff8800', 8);
  ctx.fillStyle = '#ff8800';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`WAVE ${wave}`, W - 14, 28);
  noGlow();

  ctx.fillStyle = '#ff6666';
  ctx.font = '13px Arial';
  ctx.fillText(`${enemies.length} ▸`, W - 14, 46);

  // Active effects icons
  let efx = 12;
  const efy = H - 88;
  const efDefs = [
    { cond: effects.speed  > 0, col: '#ffff00', label: 'SPD' },
    { cond: effects.attack > 0, col: '#ff8800', label: 'PWR' },
    { cond: effects.shield > 0, col: '#8888ff', label: 'DEF' }
  ];
  for (const ef of efDefs) {
    if (!ef.cond) continue;
    ctx.fillStyle = ef.col + '44';
    ctx.roundRect(efx, efy - 14, 36, 18, 4);
    ctx.fill();
    ctx.fillStyle = ef.col;
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(ef.label, efx + 18, efy);
    efx += 42;
  }

  // Dash button
  const db = dashBtnPos();
  const dprog = 1 - player.dashCooldown / DASH_COOLDOWN;
  const rdy   = player.dashCooldown <= 0;

  ctx.beginPath();
  ctx.arc(db.x, db.y, DASH_BTN_R, 0, Math.PI * 2);
  ctx.fillStyle = rdy ? 'rgba(0,100,120,0.85)' : 'rgba(0,20,40,0.85)';
  ctx.fill();

  glow(rdy ? '#00e5ff' : '#004466', 8);
  ctx.beginPath();
  ctx.arc(db.x, db.y, DASH_BTN_R, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * dprog);
  ctx.strokeStyle = rdy ? '#00e5ff' : '#004466';
  ctx.lineWidth   = 3;
  ctx.stroke();
  noGlow();

  ctx.fillStyle   = rdy ? '#00e5ff' : '#004466';
  ctx.font        = 'bold 12px Arial';
  ctx.textAlign   = 'center';
  ctx.fillText('DASH', db.x, db.y + 4);

  // Joystick
  if (joy.active) {
    ctx.globalAlpha = 0.38;
    ctx.beginPath();
    ctx.arc(joy.ox, joy.oy, JOYSTICK_R, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(joy.ox + joy.dx * JOYSTICK_R, joy.oy + joy.dy * JOYSTICK_R, JOYSTICK_KNOB, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── Menu screen ───────────────────────────────────────────────
function drawMenu() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const t  = Date.now() * 0.001;

  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Orbiting preview spinners
  const preview = [
    { type: 'rusher',  angle: t * 0.4 },
    { type: 'circler', angle: t * 0.4 + Math.PI * 0.5  },
    { type: 'tank',    angle: t * 0.4 + Math.PI },
    { type: 'bomber',  angle: t * 0.4 + Math.PI * 1.5  }
  ];
  ctx.globalAlpha = 0.28;
  for (const p of preview) {
    const et = ETYPES[p.type];
    const px = cx + Math.cos(p.angle) * 165;
    const py = cy + Math.sin(p.angle) * 120;
    drawSpinner(px, py, t * 3, et.radius * 0.75, et.blades, et.color, et.bc);
  }
  ctx.globalAlpha = 1;

  // "SPIN"
  const fs = Math.min(80, canvas.width * 0.16);
  glow('#00e5ff', 35);
  ctx.fillStyle   = '#00e5ff';
  ctx.font        = `bold ${fs}px Arial`;
  ctx.textAlign   = 'center';
  ctx.fillText('SPIN', cx, cy - 52);

  // "WARS"
  glow('#ff3333', 35);
  ctx.fillStyle = '#ff3333';
  ctx.fillText('WARS', cx, cy + fs * 0.08 - 52 + fs);
  noGlow();

  ctx.fillStyle = '#6666aa';
  ctx.font      = '15px Arial';
  ctx.fillText('BLADE CHAMPIONS', cx, cy + fs * 0.08 - 52 + fs + 26);

  // Tap to play (pulsing)
  const pulse = 0.65 + Math.sin(t * 3.2) * 0.35;
  ctx.globalAlpha = pulse;
  glow('#00e5ff', 12);
  ctx.fillStyle = '#00e5ff';
  ctx.font      = 'bold 22px Arial';
  ctx.fillText('▶  TAP TO PLAY', cx, cy + 115);
  noGlow();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#555577';
  ctx.font      = '13px Arial';
  ctx.fillText('Move: Joystick / WASD  •  Dash: Button / SPACE', cx, cy + 148);
  ctx.fillText('Defeat enemies • Collect power-ups • Survive the waves!', cx, cy + 167);

  // Legend for power-ups
  const puX = cx - 110, puY = cy + 192;
  ctx.fillStyle = '#444466';
  ctx.font      = '12px Arial';
  ctx.textAlign = 'left';
  const puInfos = [
    { label: 'E', col: '#00ffaa', txt: 'Energy' },
    { label: 'S', col: '#ffff00', txt: 'Speed'  },
    { label: 'P', col: '#ff8800', txt: 'Power'  },
    { label: 'D', col: '#8888ff', txt: 'Shield' }
  ];
  for (let i = 0; i < puInfos.length; i++) {
    const pi = puInfos[i];
    const px = puX + i * 57;
    ctx.beginPath();
    ctx.arc(px + 8, puY - 4, 9, 0, Math.PI * 2);
    ctx.strokeStyle = pi.col;
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    ctx.fillStyle   = pi.col;
    ctx.font        = 'bold 10px Arial';
    ctx.textAlign   = 'center';
    ctx.fillText(pi.label, px + 8, puY - 0.5);
    ctx.fillStyle   = '#444466';
    ctx.font        = '10px Arial';
    ctx.fillText(pi.txt, px + 8, puY + 12);
  }
  ctx.textAlign = 'center';

  if (highScore > 0) {
    glow('#ffaa00', 8);
    ctx.fillStyle = '#ffaa00';
    ctx.font      = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`BEST: ${highScore}`, cx, cy + 228);
    noGlow();
  }
}

// ── Wave clear overlay ────────────────────────────────────────
function drawWaveClear() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const p  = 1 - waveTimer / 130;

  ctx.fillStyle = `rgba(0,255,120,${0.25 * Math.sin(p * Math.PI)})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  glow('#00ff88', 22);
  ctx.fillStyle = '#00ff88';
  ctx.font      = `bold ${Math.min(44, canvas.width * 0.1)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave - 1} CLEAR!`, cx, cy - 18);
  noGlow();

  ctx.fillStyle = '#ffaa00';
  ctx.font      = '22px Arial';
  ctx.fillText(`+${(wave - 1) * 500} BONUS`, cx, cy + 26);

  ctx.fillStyle = '#888899';
  ctx.font      = '17px Arial';
  ctx.fillText(`Wave ${wave} incoming…`, cx, cy + 62);
}

// ── Game over screen ──────────────────────────────────────────
function drawGameOver() {
  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  glow('#ff2244', 24);
  ctx.fillStyle = '#ff4455';
  ctx.font      = `bold ${Math.min(56, canvas.width * 0.12)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', cx, cy - 58);
  noGlow();

  glow('#00e5ff', 10);
  ctx.fillStyle = '#00e5ff';
  ctx.font      = 'bold 34px Arial';
  ctx.fillText(`SCORE: ${score}`, cx, cy + 4);
  noGlow();

  ctx.fillStyle = '#ff8800';
  ctx.font      = '20px Arial';
  ctx.fillText(`Wave ${wave} Reached`, cx, cy + 36);

  if (score >= highScore) {
    glow('#ffff00', 14);
    ctx.fillStyle = '#ffff00';
    ctx.font      = 'bold 19px Arial';
    ctx.fillText('★  NEW HIGH SCORE!  ★', cx, cy + 72);
    noGlow();
  } else {
    ctx.fillStyle = '#666688';
    ctx.font      = '17px Arial';
    ctx.fillText(`Best: ${highScore}`, cx, cy + 72);
  }

  // Play again button
  const bw = 210, bh = 56;
  const bx = cx - bw / 2, by = cy + 102 - bh / 2;
  glow('#00e5ff', 10);
  ctx.fillStyle   = 'rgba(0,100,130,0.88)';
  ctx.roundRect(bx, by, bw, bh, 12);
  ctx.fill();
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth   = 2;
  ctx.roundRect(bx, by, bw, bh, 12);
  ctx.stroke();
  noGlow();

  ctx.fillStyle = '#00e5ff';
  ctx.font      = 'bold 22px Arial';
  ctx.fillText('PLAY AGAIN', cx, cy + 106);
}

// ── Main loop ─────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (state === STATES.MENU) {
    drawMenu();
    return;
  }

  // Apply screen shake translation
  ctx.save();
  ctx.translate(shake.x, shake.y);

  if (state === STATES.PLAYING || state === STATES.WAVE_CLEAR) {
    drawArena();
    drawPowerups();

    // Enemies
    for (const e of enemies) {
      const flash = e.invincible > 0 && Math.floor(e.invincible / 3) % 2 === 0;
      drawSpinner(e.x, e.y, e.angle, e.radius, e.blades, e.color, e.bc, flash ? 0.28 : 1);
      // Health bar
      const bw2 = e.radius * 2, bx2 = e.x - e.radius, by2 = e.y - e.radius - 7;
      ctx.fillStyle = '#222';  ctx.fillRect(bx2, by2, bw2, 4);
      ctx.fillStyle = '#ff4455'; ctx.fillRect(bx2, by2, bw2 * (e.hp / e.maxHP), 4);
    }

    // Player
    if (!player.dead) {
      const flash = player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0;
      const pColor = dashActive ? '#ffffff' : effects.shield > 0 ? '#aaaaff' : player.color;
      const pBC    = dashActive ? '#88ffff' : player.bladeColor;
      drawSpinner(player.x, player.y, player.spinAngle, player.radius, player.blades, pColor, pBC, flash ? 0.28 : 1);

      // Shield ring
      if (effects.shield > 0) {
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius + 9, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(136,136,255,${0.45 + Math.sin(Date.now() * 0.01) * 0.3})`;
        ctx.lineWidth   = 3;
        glow('#8888ff', 12);
        ctx.stroke();
        noGlow();
      }
    }

    drawParticles();
    drawHUD();

    if (state === STATES.WAVE_CLEAR) {
      drawWaveClear();
      updateWaveClear();
    } else {
      update();
    }

  } else if (state === STATES.GAME_OVER) {
    drawArena();
    drawParticles();
    tickParticles();
    updateShake();
    drawGameOver();
  }

  ctx.restore(); // end shake transform
}

// Kick off
loop();
</script>
